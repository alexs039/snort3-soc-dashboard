<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://soc.your-domain.com https://ip-api.com; img-src 'self' data:;">
<meta name="referrer" content="no-referrer">
<title>SNORT3 SOC — Security Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060e;--surface:rgba(255,255,255,0.025);--surface2:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#E2E8F0;--muted:#94A3B8;--dim:#64748B;--dark:#475569;
  --blue:#3B82F6;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;
  --purple:#8B5CF6;--crimson:#DC2626;--cyan:#06B6D4;--orange:#F97316;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 15% 0%,rgba(6,182,212,0.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(139,92,246,0.04) 0%,transparent 50%)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes critPulse{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes countUp{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes borderGlow{0%,100%{border-color:rgba(239,68,68,.3)}50%{border-color:rgba(239,68,68,.7)}}
@keyframes dotPing{0%{transform:scale(1);opacity:1}75%{transform:scale(2.5);opacity:0}100%{transform:scale(1);opacity:0}}
.animate-in{animation:fadeIn .4s ease both}

/* ── HEADER ─────────────────────────── */
.header{background:rgba(4,6,14,.9);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(30px)}
.header-left{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#06B6D4,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px rgba(6,182,212,.25);position:relative}
.logo::after{content:'';position:absolute;inset:-2px;border-radius:14px;background:inherit;z-index:-1;opacity:.3;filter:blur(10px)}
.header h1{font-family:var(--sans);font-size:20px;font-weight:800;letter-spacing:-.5px;color:#fff}
.header h1 span{background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:9px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:14px}
.clock-date{font-size:10px;color:var(--dim);text-align:right}
.clock-time{font-size:14px;color:#fff;font-weight:600;font-variant-numeric:tabular-nums}
.threat-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px}
.status-badge{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:10px;cursor:pointer;transition:all .3s}
.status-badge:hover{transform:scale(1.05)}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.live{animation:pulse 2s ease infinite}
.status-label{font-size:10px;font-weight:700;letter-spacing:1px}

/* ── TABS ───────────────────────────── */
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface);border-radius:10px;padding:3px;width:fit-content}
.tab{padding:8px 20px;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--mono);font-weight:500;color:var(--dim);transition:all .2s;border:none;background:none}
.tab.active{background:var(--surface2);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.tab:hover:not(.active){color:var(--muted)}

/* ── LAYOUT ─────────────────────────── */
.container{padding:16px 24px;max-width:1500px;margin:0 auto}

/* ── THREAT BANNER ──────────────────── */
.threat-banner{border-radius:10px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(220,38,38,.2);background:linear-gradient(90deg,rgba(220,38,38,.08),rgba(139,92,246,.03),rgba(220,38,38,.08));background-size:200% 100%;animation:critPulse 4s ease infinite}
.threat-banner.safe{border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.04);animation:none}
.threat-info{display:flex;align-items:center;gap:10px}
.threat-text{font-size:12px;font-weight:600}
.threat-count{font-size:26px;font-weight:800;font-family:var(--sans)}

/* ── STAT CARDS ─────────────────────── */
.stat-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.stat-card{border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);border:1px solid transparent;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-card.active{outline:2px solid currentColor;outline-offset:-1px}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stat-icon{font-size:16px}
.stat-value{font-size:28px;font-weight:800;font-family:var(--sans);animation:countUp .5s ease}
.stat-pct{font-size:10px;color:var(--dim);margin-top:2px}

/* ── CHARTS ─────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .3s}
.card:hover{border-color:var(--border2)}
.card-title{margin:0 0 12px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;font-weight:700;display:flex;align-items:center;gap:7px}
.card-title-icon{font-size:13px}
.bar-row{margin-bottom:9px}
.bar-row.clickable{cursor:pointer;transition:transform .15s}.bar-row.clickable:hover{transform:translateX(3px)}
.bar-header{display:flex;justify-content:space-between;margin-bottom:3px}
.bar-label{font-size:11px;color:var(--muted)}.bar-count{font-size:11px;font-weight:600}
.bar-track{height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.mitre-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.5px;background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.15)}

/* ── MAP ────────────────────────────── */
.map-container{position:relative;width:100%;height:240px;border-radius:8px;overflow:hidden;background:#080c18}
.map-container canvas{width:100%;height:100%}
.map-dot{position:absolute;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%)}
.map-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:inherit;opacity:.3;animation:dotPing 2s ease infinite}
.map-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.map-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.map-legend-dot{width:6px;height:6px;border-radius:50%}

/* ── TIMELINE ───────────────────────── */
.timeline-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding-top:8px}
.timeline-bar{flex:1;border-radius:2px 2px 0 0;min-width:3px;transition:height .5s ease;position:relative;cursor:pointer}
.timeline-bar:hover{opacity:.8}
.timeline-bar:hover::after{content:attr(data-tooltip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;margin-bottom:4px;border:1px solid var(--border2)}
.timeline-labels{display:flex;justify-content:space-between;margin-top:4px}
.timeline-labels span{font-size:9px;color:var(--dark)}

/* ── LIVE FEED ──────────────────────── */
.feed-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;margin-bottom:3px;transition:all .2s;border-left:3px solid transparent;font-size:11px}
.feed-item:hover{background:rgba(255,255,255,.02)}
.feed-item.critical{border-left-color:var(--crimson);background:rgba(220,38,38,.04)}
.feed-item.high{border-left-color:var(--red)}
.feed-item.medium{border-left-color:var(--yellow)}
.feed-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.feed-time{color:var(--dim);font-size:10px;min-width:65px;font-variant-numeric:tabular-nums}
.feed-msg{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-src{color:var(--muted);font-size:10px;min-width:110px;text-align:right}

/* ── FILTER & TABLE ─────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-box{flex:1;min-width:180px;position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dark);font-size:13px}
.search-input{width:100%;padding:9px 10px 9px 32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:12px;font-family:var(--mono);outline:none;transition:border-color .3s}
.search-input:focus{border-color:rgba(6,182,212,.4)}
.filter-btn{padding:7px 12px;border-radius:7px;font-size:10px;cursor:pointer;font-family:var(--mono);font-weight:500;transition:all .2s;border:1px solid var(--border);background:var(--surface);color:var(--muted)}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.08);color:var(--cyan)}
.sort-btn{padding:7px 10px;border-radius:7px;font-size:10px;cursor:pointer;font-family:var(--mono);border:1px solid var(--border);background:var(--surface);color:var(--muted)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-header{display:grid;grid-template-columns:85px 56px 1fr 125px 125px 55px 50px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);gap:6px}
.table-header span{font-size:9px;color:var(--dark);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.table-body{max-height:380px;overflow-y:auto}
.table-row{display:grid;grid-template-columns:85px 56px 1fr 125px 125px 55px 50px;padding:8px 14px;gap:6px;align-items:center;border-bottom:1px solid rgba(255,255,255,.02);transition:all .15s}
.table-row:hover{background:rgba(6,182,212,.03)}
.table-row.crit-row{background:rgba(220,38,38,.03)}
.table-row.crit-row:hover{background:rgba(220,38,38,.06)}
.cell-time{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums}
.cell-sev{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-align:center;letter-spacing:1px}
.cell-msg{min-width:0}
.cell-msg-text{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-msg-sub{font-size:9px;color:var(--dark);margin-top:1px}
.cell-ip{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.cell-ip.dim{color:var(--dim)}
.cell-port{font-size:9px;color:var(--muted);text-align:center;background:rgba(255,255,255,.03);border-radius:3px;padding:1px 3px}
.cell-proto{font-size:9px;color:var(--dim);text-align:center}
.empty-state{padding:30px;text-align:center;color:var(--dark);font-size:12px}

.footer{display:flex;justify-content:space-between;padding:12px 0;font-size:9px;color:#1E293B;border-top:1px solid rgba(255,255,255,.02);margin-top:6px}

/* ── MODAL ──────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#0a0a1e;border:1px solid var(--border2);border-radius:14px;padding:28px;width:440px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-head h2{color:#fff;font-family:var(--sans);font-size:16px}
.modal-close{background:none;border:none;color:#555;font-size:22px;cursor:pointer}
.modal-field{margin-bottom:14px}
.modal-label{display:block;color:var(--muted);font-size:10px;margin-bottom:5px;text-transform:uppercase;letter-spacing:1.5px}
.modal-input{width:100%;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:12px;font-family:var(--mono);outline:none}
.modal-input:focus{border-color:rgba(6,182,212,.4)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;padding:10px 0;background:linear-gradient(135deg,var(--cyan),var(--blue));border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;font-family:var(--mono);font-weight:600;box-shadow:0 4px 12px rgba(6,182,212,.25)}
.btn-secondary{flex:1;padding:10px 0;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--mono)}
.modal-hint{color:var(--dim);font-size:9px;margin-top:12px;line-height:1.5}
.ok-badge{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:6px;padding:6px 10px;margin-bottom:12px;color:var(--green);font-size:11px}
.err-badge{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:6px;padding:6px 10px;margin-bottom:12px;color:var(--red);font-size:11px}

@media(max-width:1200px){.stat-cards{grid-template-columns:repeat(3,1fr)}.grid-4,.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.stat-cards{grid-template-columns:repeat(2,1fr)}.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.filter-bar .filter-btn{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════
// SNORT3 SOC — SECURITY OPERATIONS CENTER
// ══════════════════════════════════════════════════════════════

// ── XSS SANITIZATION ────────────────────────────────────────
function esc(s){if(!s)return'';const d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML}
function safeIP(ip){return esc(String(ip||'?').replace(/[^0-9a-fA-F.:\/]/g,''))}
function safeMsg(m){return esc(String(m||'').substring(0,200))}
function safeSid(s){return esc(String(s||'?').replace(/[^0-9:]/g,''))}
function safePort(p){return esc(String(p||'?').replace(/[^0-9]/g,''))}
function safeProto(p){return esc(String(p||'?').replace(/[^A-Za-z0-9]/g,''))}

const CATS={
  recon:{label:"Scan/Recon",color:"#F59E0B",icon:"🔍",mitre:["T1046","T1018","T1110"]},
  web_attack:{label:"Web Attack",color:"#EF4444",icon:"🌐",mitre:["T1190","T1059","T1083"]},
  dos:{label:"DoS/DDoS",color:"#8B5CF6",icon:"⚡",mitre:["T1498","T1499"]},
  malware:{label:"Malware/C2",color:"#DC2626",icon:"🦠",mitre:["T1071","T1041","T1048"]},
};
const SEVS={low:{label:"Faible",color:"#10B981",range:"1-7"},medium:{label:"Moyen",color:"#F59E0B",range:"8-9"},high:{label:"Élevé",color:"#EF4444",range:"10-11"},critical:{label:"Critique",color:"#DC2626",range:"12+"}};
const MITRE_NAMES={T1046:"Network Scan",T1018:"Remote Discovery",T1110:"Brute Force",T1190:"Exploit Public App",T1059:"Command Exec",T1083:"File Discovery",T1498:"Network DoS",T1499:"Endpoint DoS",T1071:"App Layer Proto",T1041:"Exfil Over C2",T1048:"Exfil Alt Proto",T1210:"Exploit Remote Svc",T1021:"Remote Services",T1090:"Proxy/TOR",T1568:"Dynamic Resolution"};
const SID_MITRE={9001001:"T1046",9001002:"T1046",9001003:"T1046",9001004:"T1046",9001005:"T1046",9001006:"T1046",9001007:"T1018",9001009:"T1046",9001010:"T1110",9002001:"T1083",9002002:"T1190",9002003:"T1190",9002004:"T1190",9002005:"T1059",9002006:"T1059",9002007:"T1190",9002008:"T1059",9002009:"T1083",9002010:"T1190",9002011:"T1190",9002012:"T1190",9002020:"T1498",9002021:"T1498",9002022:"T1498",9002025:"T1210",9002027:"T1021",9002028:"T1498",9003001:"T1071",9003002:"T1071",9003003:"T1059",9003004:"T1059",9003005:"T1071",9003006:"T1071",9003010:"T1048",9003011:"T1071",9003022:"T1041",9003030:"T1210",9003031:"T1110",9003032:"T1071",9003033:"T1059",9004001:"T1071",9004002:"T1071",9004003:"T1071",9004004:"T1071",9004005:"T1071",9004006:"T1568",9005001:"T1090",9005002:"T1090",9005003:"T1090",9005004:"T1090",9005005:"T1090",9005006:"T1090"};

function getCat(m){if(!m)return"other";if(m.startsWith("SCAN"))return"recon";if(m.startsWith("INTRUSION HTTP"))return"web_attack";if(m.startsWith("INTRUSION DOS"))return"dos";if(m.startsWith("MALWARE"))return"malware";return"other"}
function getSev(l){if(l>=12)return"critical";if(l>=10)return"high";if(l>=8)return"medium";return"low"}
function getMitre(sid){return SID_MITRE[parseInt(sid)]||null}

// ── GEO CACHE ────────────────────────────────────────────────
const geoCache={};
const KNOWN_COUNTRIES={"RU":{lat:55.7,lng:37.6,name:"Russie"},"CN":{lat:39.9,lng:116.4,name:"Chine"},"US":{lat:38.9,lng:-77,name:"États-Unis"},"DE":{lat:52.5,lng:13.4,name:"Allemagne"},"FR":{lat:48.9,lng:2.3,name:"France"},"NL":{lat:52.4,lng:4.9,name:"Pays-Bas"},"JP":{lat:35.7,lng:139.7,name:"Japon"},"KR":{lat:37.6,lng:127,name:"Corée du Sud"},"BR":{lat:-15.8,lng:-47.9,name:"Brésil"},"IN":{lat:28.6,lng:77.2,name:"Inde"},"GB":{lat:51.5,lng:-.1,name:"Royaume-Uni"},"VN":{lat:21,lng:105.8,name:"Vietnam"},"UA":{lat:50.4,lng:30.5,name:"Ukraine"},"IR":{lat:35.7,lng:51.4,name:"Iran"},"BG":{lat:42.7,lng:23.3,name:"Bulgarie"}};

async function geoLookup(ip){
  if(geoCache[ip])return geoCache[ip];
  try{
    const r=await fetch(`https://ip-api.com/json/${ip}?fields=country,countryCode,lat,lon,org`);
    if(r.ok){const d=await r.json();if(d.lat){geoCache[ip]=d;return d;}}
  }catch(e){}
  return null;
}

// ── STATE ────────────────────────────────────────────────────
let S={
  alerts:[],winAlerts:[],filter:"all",search:"",sortDir:"desc",
  connected:false,error:"",showConfig:false,tab:"snort",
  config:{url:"https://soc.your-domain.com/opensearch",username:"",password:""},
  refreshInterval:null,geoData:{},mapReady:false
};

// ── API ──────────────────────────────────────────────────────
function authH(){return"Basic "+btoa(`${S.config.username}:${S.config.password}`)}

async function fetchAlerts(){
  if(!S.config.password)return;
  try{
    // Snort alerts
    const r=await fetch(`${S.config.url}/wazuh-alerts-*/_search`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":authH()},
      body:JSON.stringify({size:500,query:{bool:{must:[{match:{"rule.groups":"snort3"}}]}},sort:[{timestamp:{order:"desc"}}]})});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    if(d.hits?.hits?.length)S.alerts=d.hits.hits.map(h=>h._source);

    // Windows alerts
    const r2=await fetch(`${S.config.url}/wazuh-alerts-*/_search`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":authH()},
      body:JSON.stringify({size:200,query:{bool:{must:[{match:{"agent.os.platform":"windows"}}]}},sort:[{timestamp:{order:"desc"}}]})});
    if(r2.ok){const d2=await r2.json();if(d2.hits?.hits?.length)S.winAlerts=d2.hits.hits.map(h=>h._source);}

    S.connected=true;S.error="";
    // Geo lookup top IPs
    resolveGeo();
    render();
  }catch(e){S.error=e.message;S.connected=false;render()}
}

async function resolveGeo(){
  const ips={};
  S.alerts.forEach(a=>{const ip=a.data?.src_addr;if(ip&&!S.geoData[ip])ips[ip]=1});
  const unique=Object.keys(ips).slice(0,15);
  for(const ip of unique){
    const g=await geoLookup(ip);
    if(g)S.geoData[ip]={lat:g.lat,lng:g.lon,country:g.country,code:g.countryCode,org:g.org};
    await new Promise(r=>setTimeout(r,250)); // rate limit
  }
  if(unique.length>0){S.mapReady=true;render();}
}

async function connect(){
  S.error="";await fetchAlerts();
  if(S.connected){if(S.refreshInterval)clearInterval(S.refreshInterval);S.refreshInterval=setInterval(fetchAlerts,15000)}
  S.showConfig=false;render();
}

// ── STATS ────────────────────────────────────────────────────
function stats(alerts){
  const cats={recon:0,web_attack:0,dos:0,malware:0},sevs={low:0,medium:0,high:0,critical:0},sources={},mitreC={},hourly={};
  let crit=0;
  alerts.forEach(a=>{
    const cat=getCat(a.data?.msg);if(cats[cat]!==undefined)cats[cat]++;
    const sv=getSev(a.rule?.level||0);sevs[sv]++;if(sv==="critical"||sv==="high")crit++;
    const src=String(a.data?.src_addr||"?").replace(/[^0-9a-fA-F.:\/]/g,'');sources[src]=(sources[src]||0)+1;
    const m=getMitre(a.data?.sid);if(m)mitreC[m]=(mitreC[m]||0)+1;
    try{const h=new Date(a.timestamp).getHours();hourly[h]=(hourly[h]||0)+1;}catch(e){}
  });
  return{cats,sevs,topSrc:Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,8),topMitre:Object.entries(mitreC).sort((a,b)=>b[1]-a[1]).slice(0,6),hourly,total:alerts.length,crit};
}

function filterA(){
  let f=S.alerts;
  if(S.filter!=="all")f=f.filter(a=>getCat(a.data?.msg)===S.filter);
  if(S.search){const s=S.search.toLowerCase();f=f.filter(a=>(a.data?.msg||"").toLowerCase().includes(s)||(a.data?.src_addr||"").includes(s)||(a.data?.dst_addr||"").includes(s)||(a.data?.sid||"").includes(s))}
  return S.sortDir==="desc"?f:[...f].reverse();
}

// ── MAP RENDER ───────────────────────────────────────────────
function renderMap(){
  setTimeout(()=>{
    const c=document.getElementById('worldmap');if(!c)return;
    const ctx=c.getContext('2d');const W=c.width=c.parentElement.clientWidth;const H=c.height=240;
    ctx.fillStyle='#080c18';ctx.fillRect(0,0,W,H);
    // Simple world outline
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    // Grid
    for(let i=0;i<W;i+=W/12){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke()}
    for(let i=0;i<H;i+=H/6){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke()}
    // Plot dots
    const srcCount={};
    S.alerts.forEach(a=>{const ip=a.data?.src_addr;if(ip)srcCount[ip]=(srcCount[ip]||0)+1});
    Object.entries(S.geoData).forEach(([ip,geo])=>{
      const x=((geo.lng+180)/360)*W;
      const y=((90-geo.lat)/180)*H;
      const count=srcCount[ip]||1;
      const size=Math.min(3+Math.log(count)*2,12);
      const sev=count>50?"#DC2626":count>10?"#EF4444":count>3?"#F59E0B":"#3B82F6";
      // Glow
      const grad=ctx.createRadialGradient(x,y,0,x,y,size*3);
      grad.addColorStop(0,sev+'66');grad.addColorStop(1,sev+'00');
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,size*3,0,Math.PI*2);ctx.fill();
      // Dot
      ctx.fillStyle=sev;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='9px Inter';
      if(count>5)ctx.fillText(geo.code||'',x+size+3,y+3);
    });
    // Target (our server)
    const tx=((139.7+180)/360)*W;const ty=((90-35.7)/180)*H;
    ctx.fillStyle='#06B6D4';ctx.beginPath();ctx.arc(tx,ty,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#06B6D4';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#06B6D4';ctx.font='bold 10px Inter';ctx.fillText('TARGET',tx+14,ty+4);
  },100);
}

    ${S.connected?'<div class="ok-badge">● Connecté · '+S.alerts.length+' alertes Snort · '+S.winAlerts.length+' alertes Windows</div>':''}
    ${S.error?'<div class="err-badge">✗ '+esc(S.error)+'</div>':''}
    <div class="modal-field"><label class="modal-label">URL OpenSearch</label><input class="modal-input" value="${S.config.url}" oninput="S.config.url=this.value"></div>
    <div class="modal-field"><label class="modal-label">Utilisateur</label><input class="modal-input" value="${S.config.username}" oninput="S.config.username=this.value"></div>
    <div class="modal-field"><label class="modal-label">Mot de passe</label><input class="modal-input" type="password" value="${S.config.password}" oninput="S.config.password=this.value"></div>
    <div class="modal-btns"><button class="btn-primary" onclick="connect()">Connecter</button><button class="btn-secondary" onclick="S.showConfig=false;render()">Annuler</button></div>
    <p class="modal-hint">Proxy Caddy → OpenSearch · Snort IDS + Windows via Wazuh agents</p>
  </div></div>`;
}

setInterval(()=>{const cd=document.querySelector(".clock-date");const ct=document.querySelector(".clock-time");if(cd&&ct){const n=new Date();cd.textContent=n.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short",year:"numeric"});ct.textContent=n.toLocaleTimeString("fr-FR")}},1000);
render();
</script>
</body>
</html>
