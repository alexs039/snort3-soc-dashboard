<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 'unsafe-eval' removed: ES modules + Leaflet 1.9 no longer require it.
     'unsafe-inline' is kept for Leaflet's internal style injection (could be
     eliminated with a Trusted Types + nonce policy in a future hardening pass). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; connect-src https://shirako.alexis.tokyo-ict.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com;">
<meta name="referrer" content="no-referrer">
<title>SNORT3 SOC — Security Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
